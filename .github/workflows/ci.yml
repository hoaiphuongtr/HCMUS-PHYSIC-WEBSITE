name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter backend exec prisma generate

      - run: pnpm --filter backend lint

      - run: pnpm --filter backend build

      - run: pnpm --filter backend test

  admin:
    name: Admin frontend
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter admin lint

      - run: pnpm --filter admin build

      - run: pnpm --filter admin test

  public:
    name: Public frontend
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter public lint

      - run: pnpm --filter public build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, admin, public]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t hcmus-physics-backend ./backend

      - name: Build frontend image
        run: docker build --build-arg NEXT_PUBLIC_API_URL=http://localhost:3001 -t hcmus-physics-frontend ./frontend
